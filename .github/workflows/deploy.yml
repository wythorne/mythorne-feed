name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      # Download latest data from the public mythorne-feed repo via GitHub API
      # Bot pushes data here after each sync. No token needed for public repos.
      - name: Download latest data
        run: |
          REPO="wythorne/mythorne-feed"
          BRANCH="main"

          for file in muses posts meta; do
            # Bot pushes data files to repo root (not public/data/)
            DEST="public/data/${file}.json"
            echo "Fetching ${DEST}..."
            STATUS=$(curl -sSL -w "%{http_code}" -o "${DEST}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${REPO}/contents/${file}.json?ref=${BRANCH}")

            if [ "$STATUS" = "200" ]; then
              echo "  ✓ ${DEST} ✓"
            else
              echo "  ✗ ${DEST} (HTTP ${STATUS})"
              # Remove empty file on failure
              rm -f "${DEST}"
            fi
          done

          echo ""
          echo "=== public/data/ after download ==="
          ls -la public/data/ 2>/dev/null || echo "(missing)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          # Clear any stale Vite cache from previous runs
          rm -rf node_modules/.vite
          npm ci && npm run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
